---
# ═══════════════════════════════════════════════════════
#  IOB Dashboard Deployment — Target: 10.10.20.32 ONLY
#  Kafka    → already running (Docker)
#  ClickHouse → already running (native systemd)
#  Action   → Deploy IOB Dashboard only
# ═══════════════════════════════════════════════════════
- name: Deploy IOB Dashboard on 10.10.20.32
  hosts: all
  gather_facts: false
  tasks:
    - name: Create app directory
      file:
        path: /opt/iob_dashboard
        state: directory
        mode: '0755'

    - name: Copy application files on remote machine
      shell: cp /root/iob_app/{{ item }} /opt/iob_dashboard/{{ item }}
      loop:
        - app.py
        - page1.py
        - page2.py
        - page3.py
        - db_session.py
        - requirements.txt

    - name: Copy .env file
      shell: |
        cp /root/iob_app/.env /opt/iob_dashboard/.env
        chmod 600 /opt/iob_dashboard/.env

    - name: Install python3 and pip
      dnf:
        name:
          - python3
          - python3-pip
        state: present

    - name: Install Python packages from requirements.txt
      shell: pip3 install -r /opt/iob_dashboard/requirements.txt

    - name: Install ldap3
      shell: pip3 install ldap3

    - name: Create systemd service file
      copy:
        dest: /etc/systemd/system/iob_dashboard.service
        mode: '0644'
        content: |
          [Unit]
          Description=IOB Unified Dashboard
          After=network.target
          [Service]
          Type=simple
          User=root
          WorkingDirectory=/opt/iob_dashboard
          ExecStart=/usr/local/bin/streamlit run /opt/iob_dashboard/app.py --server.port 8501 --server.address 0.0.0.0 --server.headless true
          Restart=always
          RestartSec=5
          [Install]
          WantedBy=multi-user.target

    - name: Reload systemd daemon
      systemd:
        daemon_reload: true

    - name: Enable and start IOB Dashboard
      systemd:
        name: iob_dashboard
        enabled: true
        state: restarted

    - name: Open port 8501 in iptables
      shell: iptables -I INPUT -p tcp --dport 8501 -j ACCEPT || true

    - name: Wait for IOB Dashboard on port 8501
      wait_for:
        host: localhost
        port: 8501
        timeout: 60

    - name: Check IOB Dashboard status
      systemd:
        name: iob_dashboard
      register: svc_status

    - name: Show IOB Dashboard status
      debug:
        msg: "iob_dashboard is {{ svc_status.status.ActiveState }}"
